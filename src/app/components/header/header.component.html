<div class="add h-6 bg-[#d5e8ef]"></div>

<header class="shadow-md bg-[#b6d4ee]">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">

    <!-- LEFT -->
    <div class="flex items-center gap-3">
      <a routerLink="/" class="text-white font-semibold leading-tight">
        <div class="text-lg sm:text-xl lg:text-3xl">
          MY COPYRIGHT ALLY
        </div>
      </a>
    </div>

    <!-- ================= NOT ACTIVE ================= -->
    <div class="hidden sm:flex items-center gap-3"
         *ngIf="(isInactive$ | async)">

      <a routerLink="/register"
         class="px-4 py-2 rounded-full bg-[#6F93AD] text-white text-sm font-medium hover:bg-[#5d819c] transition">
        Sign up
      </a>

      <a routerLink="/login"
         class="px-4 py-2 rounded-full bg-[#3F5F78] text-white text-sm font-medium flex items-center gap-2 hover:bg-[#324e64] transition">
        Log in
      </a>

    </div>

    <!-- ================= ACTIVE USER ================= -->
    <div class="hidden sm:flex items-center gap-4"
         *ngIf="(isActive$ | async)">

      <div class="text-[#3F5F78] font-semibold">
        {{ user?.firstName }} {{ user?.lastName }}
      </div>

    </div>

    <!-- ================= MOBILE ================= -->
    <div class="sm:hidden flex items-center gap-2">

      <!-- INACTIVE -->
      <ng-container *ngIf="(isInactive$ | async)">

        <a routerLink="/register"
           class="px-3 py-1 rounded-full bg-[#6F93AD] text-white text-xs font-medium">
          Sign up
        </a>

        <a routerLink="/login"
           class="px-3 py-1 rounded-full bg-[#3F5F78] text-white text-xs font-medium">
          Login
        </a>

      </ng-container>

      <!-- ACTIVE -->
      <div *ngIf="(isActive$ | async)"
           class="text-[#3F5F78] text-sm font-semibold">
        {{ user?.firstName }}
      </div>

    </div>

  </div>
</header>
