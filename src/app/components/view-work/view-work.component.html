<!-- GLOBAL HEADER -->
<div class="bg-[#466d94] text-white h-12 px-6 py-3 flex justify-between">
      <span class="font-semibold">View Work</span>

</div>


<!-- PASSWORD SCREEN -->
<div *ngIf="!showViewer"
     class="min-h-screen flex items-center justify-center bg-[#d5e8ef]">

  <div class="bg-white p-6 rounded w-96 shadow">

    <h2 class="font-semibold mb-4">Enter password</h2>

    <input
      [(ngModel)]="password"
      type="password"
      class="border w-full p-2 rounded mb-4"
      placeholder="Password"/>

    <button
      (click)="submit()"
      class="w-full bg-[#466d94] text-white py-2 rounded">
      Access
    </button>

  </div>
</div>
<div *ngIf="showViewer" class="min-h-screen">

</div>

<!-- VIEWER MODAL -->
<div *ngIf="showViewer"
     class="fixed inset-0 bg-black/60 flex items-center justify-center z-50">

  <div class="bg-[#d5e8ef] w-[500px] rounded-xl shadow-xl overflow-hidden">

    <!-- HEADER -->
    <div class="bg-[#466d94] text-white px-6 py-4 flex justify-between items-center">
      <div>
        <div class="font-semibold text-lg">{{ work?.title }}</div>
        <div class="text-sm opacity-80">{{ work?.file_name }}</div>
      </div>

      <button (click)="closeViewer()"
              class="text-xl hover:opacity-70">
        ✕
      </button>
    </div>

    <!-- BODY -->
    <div class="px-6 py-8 text-center space-y-6">

      <p class="text-[#466d94] font-medium">
        Choose an action:
      </p>

      <div class="flex flex-col gap-3">

        <button
          (click)="download(work.downloadUrl, work.file_name)"
          class="bg-[#6f8faf] hover:bg-[#5f7f9f] text-white py-3 rounded-lg transition">
          Download Original File
        </button>

        <button
          (click)="download(work.certificateUrl, 'certificate.pdf')"
          class="bg-[#567ba1] hover:bg-[#486a8f] text-white py-3 rounded-lg transition">
          Download Certificate
        </button>

        <button
          *ngIf="work?.otsUrl"
          (click)="download(work.otsUrl, 'timestamp.ots')"
          class="bg-[#466d94] hover:bg-[#3b5f82] text-white py-3 rounded-lg transition">
          Download OTS File
        </button>

      </div>

    </div>

  </div>
</div>
